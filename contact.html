<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Choose Your Freedom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f5f0e8;
      --ink: #1a1814;
      --accent: #c8440a;
      --muted: #8a8070;
      --line: #d4cdc0;
    }
 
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
 
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
 
    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
    }
 
    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }
    .back:hover { color: var(--ink); }
    .back svg { width: 12px; height: 12px; }
 
    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }
 
    h1 em { font-style: italic; color: var(--accent); }
 
    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }
 
    .divider {
      width: 40px;
      height: 1px;
      background: var(--line);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }
 
    form {
      opacity: 0;
      animation: fadeUp 0.6s ease 0.4s forwards;
    }
 
    .field {
      margin-bottom: 1.5rem;
    }
 
    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
 
    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 0.5rem 0;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      border-radius: 0;
      -webkit-appearance: none;
    }
 
    input:focus, textarea:focus {
      border-bottom-color: var(--accent);
    }
 
    textarea {
      resize: none;
      height: 100px;
      line-height: 1.6;
    }
 
    button[type="submit"] {
      margin-top: 0.5rem;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 0.75rem 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, transform 0.1s;
    }
 
    button[type="submit"]:hover { background: var(--accent); }
    button[type="submit"]:active { transform: scale(0.98); }
 
    .success {
      display: none;
      text-align: center;
      padding: 2rem;
    }
 
    .success.visible { display: block; }
 
    .success-icon {
      width: 40px;
      height: 40px;
      color: var(--accent);
      margin: 0 auto 1rem;
    }
 
    .success h2 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
 
    .success p {
      font-size: 0.78rem;
      color: var(--muted);
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
 
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      border-color: var(--line);
      border-style: solid;
      opacity: 0.6;
    }
    .corner-tl { top: 1.5rem; left: 1.5rem; border-width: 1px 0 0 1px; }
    .corner-tr { top: 1.5rem; right: 1.5rem; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 1.5rem; left: 1.5rem; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 1.5rem; right: 1.5rem; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
 
  <div class="container">
    <a href="index.html" class="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour
    </a>
 
    <h1>Nous <em>contacter</em></h1>
    <p class="subtitle">Nous vous répondrons dans les meilleurs délais.</p>
    <div class="divider"></div>
 
    <form id="contact-form" action="https://formspree.io/f/mlgkjdlz" method="POST">
      <div class="field">
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" required placeholder="Votre nom">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="votre@email.com">
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Votre message…"></textarea>
      </div>
      <button type="submit">Envoyer</button>
    </form>
 
    <div class="success" id="success">
      <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      <h2>Message <em>envoyé</em></h2>
      <p>Merci, nous vous répondrons prochainement.</p>
    </div>
  </div>
 
  <script>
    const form = document.getElementById('contact-form');
    const success = document.getElementById('success');
 
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        success.classList.add('visible');
      }
    });
  </script>
</body>
</html>
